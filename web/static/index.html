<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slider WebSocket Demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 2rem;
        }
        .slider-container {
            margin-bottom: 1.5rem;
        }
        .value {
            font-weight: bold;
            margin-left: 0.5rem;
        }
        #server-message {
            margin-top: 2rem;
            padding: 1rem;
            border: 1px solid #ccc;
            background: #f7f7f7;
        }
    </style>
</head>
<body>
    <h1>Randomizer API Sliders</h1>

    <div class="slider-container">
        <label for="slider1">Slider 1:</label>
        <input type="range" id="slider1" min="0" max="2.5" value="0" step="0.1">
        <span id="slider1-value" class="value">0</span>
    </div>

    <div class="slider-container">
        <label for="slider2">Slider 2:</label>
        <input type="range" id="slider2" min="0" max="2.5" value="0" step="0.1">
        <span id="slider2-value" class="value">0</span>
    </div>

    <div id="server-message">Waiting for server updates…</div>

<script>
    const slider1 = document.getElementById("slider1");
    const slider2 = document.getElementById("slider2");
    const slider1Value = document.getElementById("slider1-value");
    const slider2Value = document.getElementById("slider2-value");
    const serverMessage = document.getElementById("server-message");

    function updateLabels() {
        slider1Value.textContent = slider1.value;
        slider2Value.textContent = slider2.value;
    }

    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${protocol}://${window.location.host}/ws`);

    // Tell the browser we expect binary data as ArrayBuffer
    ws.binaryType = "arraybuffer";  // so event.data is an ArrayBuffer for binary messages [web:12][web:20]

    ws.onopen = () => {
        console.log("WebSocket opened");
        serverMessage.textContent = "WebSocket connected";
        sendValues();  // send initial values
    };

    ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
            const buffer = event.data;
            const view = new DataView(buffer);
            const slider1Val = view.getInt32(0, false); // big-endian
            const slider2Val = view.getInt32(4, false); // big-endian

            serverMessage.textContent =
                `Binary reply: slider1=${slider1Val}, slider2=${slider2Val}`;
            console.log("Received binary:", slider1Val, slider2Val);
        } else {
            console.log("Unexpected non-binary message:", event.data);
        }
    };

    ws.onerror = (event) => {
        console.error("WebSocket error", event);
        serverMessage.textContent = "WebSocket error (see console)";
    };

    ws.onclose = () => {
        console.log("WebSocket closed");
        serverMessage.textContent = "WebSocket closed";
    };

    function sendValues() {
        if (ws.readyState !== WebSocket.OPEN) {
            console.log("WebSocket not open, readyState =", ws.readyState);
            return;
        }

        const s1 = Number(slider1.value);
        const s2 = Number(slider2.value);

        // 8‑byte buffer: 2 x 32‑bit signed ints, big-endian to match Python struct("!ii")
        const buffer = new ArrayBuffer(8);
        const view = new DataView(buffer);
        view.setInt32(0, s1, false); // big-endian
        view.setInt32(4, s2, false); // big-endian

        console.log("Sending binary:", s1, s2);
        ws.send(buffer);
    }

    slider1.addEventListener("input", () => {
        updateLabels();
        sendValues();
    });

    slider2.addEventListener("input", () => {
        updateLabels();
        sendValues();
    });

    updateLabels();
</script>

</body>
</html>
